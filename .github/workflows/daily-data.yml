# The automation heartbeat: fetch today's mandi prices and commit them.
# Runs twice daily because Agmarknet data lands through the IST afternoon;
# the second run catches late-reporting markets (the OGD resource is a
# rolling window — a missed day is unrecoverable from it).
name: daily-data

on:
  schedule:
    - cron: "0 9 * * *"    # ~14:30 IST
    - cron: "30 13 * * *"  # ~19:00 IST
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # to push the data commit
      issues: write # to open a failure alert
      actions: write # to dispatch the deploy workflow after a data push
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pinned dependencies
        run: |
          pip install --require-hashes -r pipeline/requirements.txt
          pip install --no-deps -e pipeline

      - name: Fetch and upsert data
        env:
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
        run: python -m mandi fetch

      # Kerala DES daily wholesale bulletin (Kozhikode-town prices).
      # Incremental via data/des_state.json — missed days heal on the next run.
      # continue-on-error: a DES outage must NOT block committing the OGD
      # rows fetched above (that window is unrecoverable); the failure is
      # re-raised after the commit so the alert issue still opens.
      - name: Fetch Kerala DES bulletin
        id: des
        continue-on-error: true
        run: python -m mandi des-fetch

      - name: Commit data if changed
        id: commit
        run: |
          if git diff --quiet data/; then
            echo "no data changes"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "mandi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git commit -m "data: update $(date -u +%F)"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # Pushes made with github.token intentionally do not trigger other
      # workflows (GitHub anti-loop rule), so dispatch the deploy explicitly.
      - name: Trigger site deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main

      - name: Surface DES failure after commit
        if: steps.des.outcome == 'failure'
        run: |
          echo "des-fetch failed (data committed anyway; DES gap heals on next run)"
          exit 1

      - name: Open alert issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="daily-data pipeline failed"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' || true)
          body="Run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label bug
          fi
