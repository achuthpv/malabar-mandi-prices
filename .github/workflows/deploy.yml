# Build the static site + JSON API and deploy to GitHub Pages.
# Data commits from daily-data.yml touch data/**, so every data update
# automatically redeploys the site — no cross-workflow choreography.
name: deploy

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "site/**"
      - "config/**"
      - "pipeline/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pinned dependencies
        run: |
          pip install --require-hashes -r pipeline/requirements.txt
          pip install --no-deps -e pipeline

      - name: Build analysis and API JSON
        run: |
          python -m mandi analyze
          python -m mandi publish

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
