name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pipeline/requirements.txt
            pipeline/requirements-dev.txt

      - name: Install pinned dependencies
        run: |
          pip install --require-hashes -r pipeline/requirements.txt -r pipeline/requirements-dev.txt
          pip install --no-deps -e pipeline

      - name: Lint (ruff, includes security rules)
        run: ruff check pipeline/src pipeline/tests e2e

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r pipeline/requirements.txt

      - name: Unit tests
        run: python -m pytest pipeline/tests -q

      - name: Build API artifacts from committed data
        run: |
          python -m mandi analyze
          python -m mandi publish

      - name: Validate OpenAPI spec and API contract
        run: python e2e/validate_contract.py

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: E2E smoke tests
        run: python -m pytest e2e -q
