# ============================================================================
# Data source configuration — THE extensibility point.
# To track a new commodity or district, add a block here. No code changes.
#
# ogd_names are the EXACT strings the data.gov.in / Agmarknet feed uses.
# Verify with:  python -m mandi discover
# ============================================================================

source:
  ogd_resource: "9ef84268-d588-465a-a308-a864a43d0070"
  base_url: "https://api.data.gov.in/resource"
  # The OGD feed currently reports Kerala as "Keralam"; keep old spelling too.
  state_names: ["Keralam", "Kerala"]

region_label: "Calicut & North Kerala (Malabar)"

# Districts of interest. ogd_names lists every spelling seen in the feed.
districts:
  - name: Kozhikode
    ogd_names: ["Kozhikode(Calicut)", "Kozhikode", "Calicut"]
  - name: Kannur
    ogd_names: ["Kannur", "Cannanore"]
  - name: Kasargod
    ogd_names: ["Kasargod", "Kasaragod"]
  - name: Wayanad
    ogd_names: ["Wayanad", "Waynad"]
  - name: Malappuram
    ogd_names: ["Malappuram"]
  - name: Palakkad
    ogd_names: ["Palakkad", "Palghat"]

# Commodities of interest.
#   slug     : stable identifier used in file paths, API URLs and the frontend
#   ogd_names: exact commodity strings in the OGD feed that map to this slug
#   unit     : display unit (OGD mandi prices are Rs per quintal)
#   sanity   : hard bounds for modal price; rows outside go to quarantine
commodities:
  - slug: arecanut
    display: Arecanut
    ogd_names: ["Arecanut(Betelnut/Supari)", "Arecanut", "Betelnuts"]
    unit: "Rs/quintal"
    sanity: { min: 5000, max: 150000 }

  - slug: black-pepper
    display: Black Pepper
    ogd_names: ["Black pepper", "Pepper ungarbled", "Pepper garbled", "Pepper"]
    unit: "Rs/quintal"
    sanity: { min: 10000, max: 250000 }

  - slug: coconut
    display: Coconut
    ogd_names: ["Coconut"]
    unit: "Rs/quintal"
    sanity: { min: 500, max: 30000 }
