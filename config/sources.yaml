# ============================================================================
# Data source configuration — THE extensibility point.
# To track a new commodity, district or market, add a block here. No code
# changes. Verify exact feed spellings first with:  python -m mandi discover
#
# districts:
#   markets:     optional whitelist (substring match, case-insensitive).
#                Omit to ingest every market in the district.
#   benchmark:   true = reference area for price comparison/arbitrage only —
#                shown in tables, charts and spreads, but EXCLUDED from the
#                home region's pooled seasonality analysis.
#   des_markets: town names as printed in the Kerala DES daily wholesale
#                price bulletin (ecostat.kerala.gov.in) that belong to this
#                district. Only listed towns are ingested from DES.
# ============================================================================

source:
  ogd_resource: "9ef84268-d588-465a-a308-a864a43d0070"
  base_url: "https://api.data.gov.in/resource"

region_label: "Calicut & North Kerala (Malabar)"

states:
  # ---- home region -------------------------------------------------------
  - names: ["Keralam", "Kerala"]   # the OGD feed currently says "Keralam"
    districts:
      - name: Kozhikode
        ogd_names: ["Kozhikode(Calicut)", "Kozhikode", "Calicut"]
        des_markets: ["Kozhikode", "Vadakara", "Vatakara", "Koyilandy", "Quilandy"]
      - name: Kannur
        ogd_names: ["Kannur", "Cannanore"]
        des_markets: ["Kannur", "Thalassery", "Taliparamba", "Payyannur"]
      - name: Kasargod
        ogd_names: ["Kasargod", "Kasaragod"]
        des_markets: ["Kasaragod", "Kasargod", "Kanhangad"]
      - name: Wayanad
        ogd_names: ["Wayanad", "Waynad"]
        des_markets: ["Mananthavady", "Kalpetta", "Sulthan Bathery", "Sulthanbathery"]
      - name: Malappuram
        ogd_names: ["Malappuram"]
        des_markets: ["Malappuram", "Manjeri", "Perinthalmanna", "Ponnani", "Tirur"]
      - name: Palakkad
        ogd_names: ["Palakkad", "Palghat"]
        des_markets: ["Palakkad", "Ottappalam", "Chittur", "Alathur"]
      # Kochi-area terminal markets set the pepper reference price
      - name: Ernakulam
        ogd_names: ["Ernakulam"]
        benchmark: true
        des_markets: ["Kochi", "Ernakulam", "Perumbavoor", "Aluva", "North Paravur",
                      "Angamaly", "Muvattupuzha", "Kothamangalam"]

  # ---- out-of-state benchmarks (arbitrage reference) ----------------------
  - names: ["Karnataka"]
    districts:
      # Sirsi belt — the national arecanut reference
      - name: Uttara Kannada
        ogd_names: ["Uttara Kannada", "Karwar(Uttar Kannand)", "Uttar Kannad"]
        benchmark: true
        markets: ["Sirsi", "Yellapur", "Honnavar", "Kumta", "Siddapur"]
      - name: Shivamogga
        ogd_names: ["Shivamogga", "Shimoga"]
        benchmark: true
        markets: ["Shimoga", "Shivamogga", "Sagar"]

  - names: ["Tamil Nadu"]
    districts:
      # Pollachi/Coimbatore — the coconut & copra reference
      - name: Coimbatore
        ogd_names: ["Coimbatore"]
        benchmark: true
        markets: ["Pollachi", "Coimbatore", "Sulur"]

# commodities:
#   des_items: item headings in the Kerala DES bulletin (Quintal tables only)
#              that map to this commodity, with the variety name to store.
commodities:
  - slug: arecanut
    display: Arecanut
    ogd_names: ["Arecanut(Betelnut/Supari)", "Arecanut", "Betelnuts"]
    unit: "Rs/quintal"
    sanity: { min: 5000, max: 150000 }
    des_items:
      "Arecanut (Ripe)": "Ripe"
      "Tender Arecanut (Paiga)": "Tender (Paiga)"
      "Arecanut Dry 1st Quality": "Dry 1st Quality"
      "Arecanut Dry 2nd Quality": "Dry 2nd Quality"
      "Arecanut Dry New": "Dry New"
      "Arecanut Dry Old": "Dry Old"

  - slug: black-pepper
    display: Black Pepper
    ogd_names: ["Black pepper", "Pepper ungarbled", "Pepper garbled", "Pepper"]
    unit: "Rs/quintal"
    sanity: { min: 10000, max: 250000 }
    des_items:
      "Pepper (Nadan)": "Nadan"
      "Pepper Garbled": "Garbled"
      "Pepper (Ungarbled)": "Ungarbled"
      "Pepper (Wayanadan)": "Wayanadan"
      "Pepper (Chettan)": "Chettan"

  - slug: coconut
    display: Coconut
    ogd_names: ["Coconut"]
    unit: "Rs/quintal"
    sanity: { min: 500, max: 30000 }
    des_items:
      "Coconut Without Husk (W O H)": "Without Husk"
